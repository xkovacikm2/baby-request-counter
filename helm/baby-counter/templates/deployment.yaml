apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "baby-counter.fullname" . }}
  labels:
    {{- include "baby-counter.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.rails.replicaCount }}
  selector:
    matchLabels:
      {{- include "baby-counter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "baby-counter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "baby-counter.postgresqlHost" . }} 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        - name: db-migrate
          image: "{{ .Values.rails.image.repository }}:{{ .Values.rails.image.tag }}"
          imagePullPolicy: {{ .Values.rails.image.pullPolicy }}
          command: ["bin/rails", "db:prepare"]
          envFrom:
            - configMapRef:
                name: {{ include "baby-counter.fullname" . }}
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "baby-counter.fullname" . }}
                  key: rails-secret-key-base
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "baby-counter.fullname" . }}
                  key: postgres-password
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.rails.image.repository }}:{{ .Values.rails.image.tag }}"
          imagePullPolicy: {{ .Values.rails.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "baby-counter.fullname" . }}
          env:
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "baby-counter.fullname" . }}
                  key: rails-secret-key-base
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "baby-counter.fullname" . }}
                  key: postgres-password
          livenessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /up
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.rails.resources | nindent 12 }}
